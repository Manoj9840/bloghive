<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo/bloghive.png" alt="BlogHive Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="view-blogs.html">Blogs</a></li>

                <li><a href="create-blog.html" class="btn-primary">Create Blog</a></li>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <a href="edit-blog.html"
                            style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Edit</a>
                        <a href="#" style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Delete</a>

                </div>
            </div>
            <!-- More blogs will be loaded here -->

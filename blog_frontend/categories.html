<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | BlogHive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 50px;
        }

        .category-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .category-card:hover {
            transform: translateY(-10px);
            background: var(--primary-color);
            color: white;
        }

        .category-card i {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .category-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .category-card p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo/bloghive.png" alt="BlogHive Logo">
            </a>
            <div class="menu-toggle" id="mobile-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="view-blogs.html">Blogs</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero" style="padding: 60px 0; border-radius: 0 0 50px 50px;">
        <div class="container">
            <h1>Explore Categories</h1>
            <p>Discover stories by topic. From code to coffee, we have it all.</p>
            <div id="add-category-action" style="margin-top: 30px; display: none;">
                <button id="show-add-category-btn" class="btn-primary" style="border: none; cursor: pointer;">+ Add New
                    Category</button>
            </div>
        </div>
    </header>

    <div id="add-category-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
        <div
            style="background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: var(--shadow);">
            <h2 style="margin-bottom: 20px;">Add New Category</h2>
            <form id="add-category-form">
                <div class="form-group">
                    <label for="cat-name">Category Name</label>
                    <input type="text" id="cat-name" required placeholder="e.g. Photography">
                </div>
                <div class="form-group">
                    <label for="cat-description">Description</label>
                    <textarea id="cat-description" placeholder="Short description of this category"
                        style="min-height: 80px;"></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="flex: 1; border: none; cursor: pointer;">Create
                        Category</button>
                    <button type="button" id="close-modal-btn"
                        style="flex: 1; background: #f1f5f9; color: var(--text-muted); border: none; border-radius: 8px; cursor: pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <main class="container">
        <div class="category-grid" id="category-grid">
            <p style="text-align: center; grid-column: 1/-1;">Loading categories...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 BlogHive. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>

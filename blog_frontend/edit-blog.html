<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Blog | BlogHive</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo/bloghive.png" alt="BlogHive Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="view-blogs.html">My Blogs</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 50px;">
        <h2 style="margin-bottom: 30px;">Edit Your Story</h2>
        <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow);">
            <form id="edit-blog-form">
                <div class="form-group">
                    <label for="title">Blog Title</label>
                    <input type="text" id="title" required placeholder="Enter your title">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" placeholder="e.g. technology, life, news">
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" rows="15" required placeholder="Start writing your story..."></textarea>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn-primary"
                        style="border: none; cursor: pointer; padding: 15px 30px;">Update Blog</button>
                    <a href="view-blogs.html"
                        style="padding: 15px 30px; text-decoration: none; color: var(--text-muted); border: 1px solid #e2e8f0; border-radius: 8px;">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BlogHive</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo/bloghive.png" alt="BlogHive Logo">
            </a>
            <div class="menu-toggle" id="mobile-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="categories.html">Categories</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-form-container">
        <h2 style="margin-bottom: 20px; text-align: center;">Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
            Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a>
        </p>
    </div>

    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>

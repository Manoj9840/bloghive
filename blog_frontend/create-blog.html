<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog | BlogHive</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="logo/bloghive.png" alt="BlogHive Logo">
            </a>
            <div class="menu-toggle" id="mobile-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="view-blogs.html">My Blogs</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 50px;">
        <h2 style="margin-bottom: 30px;">Compose a New Story</h2>
        <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow);">
            <form id="create-blog-form">
                <div class="form-group">
                    <label for="title">Blog Title</label>
                    <input type="text" id="title" required placeholder="Enter a catchy title">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" placeholder="e.g. technology, life, news">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label for="content" style="margin-bottom: 0;">Content</label>
                        <button type="button" id="ai-fix-btn" class="btn-secondary" style="font-size: 0.8rem; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--primary-color); background: #f0f7ff; color: var(--primary-color); cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <span id="ai-fix-icon">✨</span> <span id="ai-fix-text">Auto-Correct with AI</span>
                        </button>
                    </div>
                    <textarea id="content" rows="15" required placeholder="Start writing your story..."></textarea>
                </div>
                <button type="submit" class="btn-primary"
                    style="border: none; cursor: pointer; padding: 15px 30px;">Publish Blog</button>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/chatbot.js"></script>
</body>

</html>
